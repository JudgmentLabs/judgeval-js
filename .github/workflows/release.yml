name: Create new Release
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    outputs:
      exists: ${{ steps.tag-check.outputs.exists }}
      version: ${{ steps.pkg.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout canonical JQL sources
        uses: actions/checkout@v4
        with:
          repository: JudgmentLabs/judgment-mono
          ref: main
          token: ${{ secrets.RELEASE_BOT_GITHUB_PAT }}
          persist-credentials: false
          path: .jql-source/judgment-mono

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: "1.3.2"

      - run: bun install --frozen-lockfile
      - name: Check canonical JQL parity
        run: |
          bun run generate-jql \
            .jql-source/judgment-mono/services/data-access-service/openapi.json \
            .jql-source/judgment-mono/packages/dal-client/src/builder.ts \
            .jql-source/judgment-mono/services/judgeval-server/openapi.public-jql.json
          git diff --exit-code -- src/jql
      - run: bun run check
      - run: bun run build
      - name: Check generated JQL output is current
        run: git diff --exit-code -- src/jql
      - name: Check package contents with canonical checkout present
        run: bun run check-package

      - name: Get version from package.json
        id: pkg
        run: echo "version=$(bun -e "console.log(require('./package.json').version)")" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: tag-check
        run: |
          if git rev-parse "v${{ steps.pkg.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create and push tag
        if: steps.tag-check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag v${{ steps.pkg.outputs.version }}
          git push origin v${{ steps.pkg.outputs.version }}

  publish:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    if: needs.release.outputs.exists == 'false'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: "1.3.2"

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - run: bun install
      - run: bun run check
      - run: bun run build

      - name: Check package contents
        run: bun run check-package

      - name: Publish to npm
        run: npm publish --provenance --access public

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.release.outputs.version }}
          name: Release v${{ needs.release.outputs.version }}
          generate_release_notes: true
